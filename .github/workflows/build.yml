name: Build Persian Learning App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════
  #  Windows 构建
  # ═══════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyqt6 PyQt6-WebEngine requests beautifulsoup4 lxml

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "data;data" `
            --hidden-import=PyQt6.QtWebEngineWidgets `
            --hidden-import=PyQt6.QtWebChannel `
            --hidden-import=bs4 `
            --hidden-import=lxml `
            --hidden-import=aiohttp `
            --name="PersianLearning" `
            main.py

      - name: Zip for distribution
        run: |
          Compress-Archive -Path "dist/PersianLearning.exe" -DestinationPath "PersianLearning-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersianLearning-Windows
          path: PersianLearning-Windows.zip

  # ═══════════════════════════════════════════════════════
  #  macOS 构建
  # ═══════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyqt6 PyQt6-WebEngine requests beautifulsoup4 lxml

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "data:data" \
            --hidden-import=PyQt6.QtWebEngineWidgets \
            --hidden-import=PyQt6.QtWebChannel \
            --hidden-import=bs4 \
            --hidden-import=lxml \
            --hidden-import=aiohttp \
            --name="PersianLearning" \
            --osx-bundle-identifier=com.persianlearning.app \
            main.py

      - name: Zip for distribution
        run: |
          cd dist
          zip -r ../PersianLearning-macOS.zip PersianLearning
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersianLearning-macOS
          path: PersianLearning-macOS.zip

  # ═══════════════════════════════════════════════════════
  #  创建 GitHub Release（只在打 tag 时触发）
  # ═══════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PersianLearning-Windows/PersianLearning-Windows.zip
            artifacts/PersianLearning-macOS/PersianLearning-macOS.zip
          generate_release_notes: true
